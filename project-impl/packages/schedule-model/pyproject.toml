[project]
name = "schedule-model"
version = "0.1.0"
description = "Solar Schedule Model Interface (includes base MILP model for the time being)"
requires-python = ">=3.14"
dependencies = [
    "matplotlib>=3.10.8",
    "numpy>=2.4.2",
    "scipy>=1.17.1",
]

[tool.hatch.build.targets.wheel]
packages = ["src/schedule_model"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"