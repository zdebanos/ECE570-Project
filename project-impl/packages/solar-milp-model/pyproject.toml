[project]
name = "solar-milp-model"
version = "0.1.0"
description = "Solar MILP optimization model for household energy scheduling"
requires-python = ">=3.14"
dependencies = [
    "matplotlib>=3.10.8",
    "numpy>=2.4.2",
    "scipy>=1.17.1",
]

[project.scripts]
solar-milp = "solar_milp_model.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"