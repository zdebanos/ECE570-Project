[project]
name = "solar-gru"
version = "0.1.0"
description = "Solar GRU model for household energy forecasting"
requires-python = ">=3.14"
dependencies = ["numpy", "pandas", "openmeteo-requests", "requests-cache", "retry-requests", "pvlib"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"